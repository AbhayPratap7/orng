<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ORNG.BNB — slice to enter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --cream:#fffdf8;
    --ink:#241a12;
    --orange:#f2801f;
    --orange-deep:#d9660e;
    --peel:#e8791c;
    --flesh:#ffc24d;
    --leaf:#3d7a34;
    --purple:#6b3fa0;
  }

  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--cream);
    font-family:'Inter', sans-serif;
    color:var(--ink);
    overflow:hidden;
  }

  #stage{
    position:fixed; inset:0;
    overflow:hidden;
    touch-action:none;
    cursor: crosshair;
    transition: opacity .6s ease, filter .6s ease;
  }
  #stage.leaving{ opacity:0; filter:blur(6px); pointer-events:none; }

  /* ---- center orange rig ---- */
  #orange-rig{
    position:absolute;
    left:50%; top:50%;
    width:min(30vw, 220px); height:min(30vw, 220px);
    transform: translate(-50%,-50%);
    z-index:5;
  }
  #glow-ring{
    position:absolute; inset:-18%;
    border-radius:50%;
    background:radial-gradient(circle, rgba(242,128,31,.28) 0%, rgba(242,128,31,0) 70%);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ transform:scale(.92); opacity:.7; }
    50%{ transform:scale(1.12); opacity:1; }
  }
  #orange{
    position:absolute; inset:0;
    filter: drop-shadow(0 10px 18px rgba(180,90,10,.35));
    will-change: transform;
  }
  #orange svg{ width:100%; height:100%; display:block; }

  #orange-rig.sliced #glow-ring, #orange-rig.sliced #orange{ opacity:0; transition: opacity .25s ease; }

  .half{
    position:absolute; inset:0;
    border-radius:50%;
    opacity:0;
    pointer-events:none;
  }
  .half .peel{
    position:absolute; inset:0; border-radius:50%;
    background:var(--peel);
  }
  .half .flesh{
    position:absolute; inset:6%; border-radius:50%;
    background:
      repeating-conic-gradient(from 0deg, rgba(255,255,255,.35) 0deg 2deg, transparent 2deg 16deg),
      radial-gradient(circle at 50% 45%, #fff2cf, var(--flesh) 55%, #ff9d2e 100%);
  }
  .half.left  { clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%); }
  .half.right { clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%); }
  .half.fly{
    animation-duration:.75s;
    animation-timing-function: cubic-bezier(.2,.8,.3,1);
    animation-fill-mode: forwards;
  }
  .half.left.fly{ animation-name: flyLeft; }
  .half.right.fly{ animation-name: flyRight; }
  @keyframes flyLeft{
    0%{ opacity:1; transform: translate(0,0) rotate(0deg); }
    100%{ opacity:0; transform: translate(var(--fx), var(--fy)) rotate(-50deg); }
  }
  @keyframes flyRight{
    0%{ opacity:1; transform: translate(0,0) rotate(0deg); }
    100%{ opacity:0; transform: translate(calc(var(--fx) * -1), calc(var(--fy) * -1)) rotate(50deg); }
  }

  .droplet{
    position:fixed; width:8px; height:8px; border-radius:50%;
    background: radial-gradient(circle, #ffe19a, #f2801f);
    pointer-events:none;
    animation: burst .7s ease-out forwards;
    z-index:20;
  }
  @keyframes burst{
    0%{ transform: translate(0,0) scale(1); opacity:1; }
    100%{ transform: translate(var(--tx), var(--ty)) scale(.3); opacity:0; }
  }

  .flash{
    position:fixed; border-radius:50%;
    background: radial-gradient(circle, rgba(255,244,214,.9), rgba(242,128,31,0) 70%);
    pointer-events:none;
    transform: translate(-50%,-50%) scale(0);
    animation: flash .5s ease-out forwards;
    z-index:19;
  }
  @keyframes flash{
    0%{ transform: translate(-50%,-50%) scale(0); opacity:.9; }
    100%{ transform: translate(-50%,-50%) scale(2.6); opacity:0; }
  }

  /* ---- gate text ---- */
  #gate-text{
    position:absolute; left:50%; bottom:9%;
    transform:translateX(-50%);
    text-align:center;
    z-index:5;
    transition: opacity .4s ease;
  }
  #gate-text .hint{
    margin:0 0 10px;
    font-size:13px;
    letter-spacing:.35em;
    text-transform:uppercase;
    color:#7a5a33;
    font-weight:500;
  }
  #gate-text .logo{
    margin:0;
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:clamp(28px, 5vw, 44px);
    letter-spacing:.14em;
    color:var(--orange-deep);
  }
  #skip-link{
    margin-top:14px;
    background:none; border:none;
    font-family:'Inter', sans-serif;
    font-size:12px;
    color:#a98a5f;
    text-decoration:underline;
    cursor:pointer;
    display:block;
    margin-left:auto; margin-right:auto;
  }

  #slice-canvas{
    position:fixed; inset:0; z-index:15; pointer-events:none;
  }

  /* ---- revealed site ---- */
  #site{
    position:fixed; inset:0;
    background:var(--cream);
    display:flex; align-items:center; justify-content:center;
    opacity:0;
    transition: opacity .8s ease;
    text-align:center;
    padding:24px;
  }
  #site{ pointer-events:none; }
  #site.show{ opacity:1; pointer-events:auto; }
  #site .inner{ max-width:560px; }
  #site h1{
    font-family:'Fredoka', sans-serif;
    font-size:clamp(32px, 6vw, 56px);
    color:var(--orange-deep);
    margin:0 0 14px;
    letter-spacing:.04em;
  }
  #site p{
    font-size:16px; line-height:1.6; color:#5a4530;
    margin:0 0 26px;
  }
  #site button.cta{
    background:var(--orange);
    color:#fff; border:none;
    font-family:'Inter', sans-serif;
    font-weight:600; font-size:14px;
    letter-spacing:.06em; text-transform:uppercase;
    padding:14px 30px; border-radius:999px;
    cursor:pointer;
  }

  @media (prefers-reduced-motion: reduce){
    #glow-ring{ animation:none; }
    #orange{ transition:none; }
  }
</style>
</head>
<body>

<div id="stage">
  <!-- center orange -->
  <div id="orange-rig">
    <div id="glow-ring"></div>
    <div id="orange"></div>
    <div class="half left"><div class="peel"></div><div class="flesh"></div></div>
    <div class="half right"><div class="peel"></div><div class="flesh"></div></div>
  </div>

  <div id="gate-text">
    <p class="hint">go on&hellip; slice me to get in!</p>
    <h1 class="logo">ORNG.BNB</h1>
    <button id="skip-link">enter without slicing</button>
  </div>

  <canvas id="slice-canvas"></canvas>
</div>

<div id="site" hidden>
  <div class="inner">
    <h1>Welcome to ORNG.BNB</h1>
    <p>You sliced your way in. This is where the rest of the site picks up — swap this block out for your real homepage content.</p>
    <button class="cta">Explore the shop</button>
  </div>
</div>

<script>
(function(){
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---------- fruit artwork ----------
  const svgWrap = (inner) => `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;

  const ORANGE_SVG = svgWrap(`
    <circle cx="50" cy="54" r="34" fill="#f2801f"/>
    <circle cx="50" cy="54" r="34" fill="url(#og)"/>
    <path d="M50 20 C48 24,52 26,50 30" stroke="#6b4226" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M52 22 Q66 14 68 26 Q58 32 52 22 Z" fill="#3d7a34"/>
    <ellipse cx="38" cy="42" rx="8" ry="12" fill="#ffffff" opacity=".22"/>
    <defs>
      <radialGradient id="og" cx="35%" cy="30%" r="75%">
        <stop offset="0%" stop-color="#ffb454"/>
        <stop offset="60%" stop-color="#f2801f" stop-opacity="0"/>
      </radialGradient>
    </defs>
  `);

  document.getElementById('orange').innerHTML = ORANGE_SVG;

  const stage = document.getElementById('stage');
  const orangeEl = document.getElementById('orange');

  function frame(t){
    const time = t / 1000;
    if(!reduceMotion){
      const bob = Math.sin(time*1.2) * 6;
      orangeEl.style.transform = `translateY(${bob}px) rotate(${Math.sin(time*0.6)*4}deg)`;
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ---------- slice trail ----------
  const canvas = document.getElementById('slice-canvas');
  const ctx = canvas.getContext('2d');
  function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  let dragging = false;
  let points = [];
  let sliced = false;

  function drawTrail(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(points.length < 2) return;
    ctx.strokeStyle = 'rgba(242,128,31,0.85)';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for(let i=1;i<points.length;i++) ctx.lineTo(points[i].x, points[i].y);
    ctx.stroke();
  }

  function clearTrailSoon(){
    setTimeout(()=>{
      if(!dragging){ points = []; ctx.clearRect(0,0,canvas.width,canvas.height); }
    }, 200);
  }

  function orangeRect(){
    const rig = document.getElementById('orange-rig');
    return rig.getBoundingClientRect();
  }

  function pathHitsOrange(pts){
    const r = orangeRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    const radius = r.width/2 * 1.05;
    return pts.some(p=>{
      const dx = p.x-cx, dy = p.y-cy;
      return Math.sqrt(dx*dx+dy*dy) < radius;
    });
  }

  function pathLength(pts){
    let len = 0;
    for(let i=1;i<pts.length;i++){
      len += Math.hypot(pts[i].x-pts[i-1].x, pts[i].y-pts[i-1].y);
    }
    return len;
  }

  stage.addEventListener('pointerdown', (e)=>{
    if(sliced) return;
    dragging = true;
    points = [{x:e.clientX, y:e.clientY}];
  });
  stage.addEventListener('pointermove', (e)=>{
    if(!dragging || sliced) return;
    points.push({x:e.clientX, y:e.clientY});
    if(points.length > 40) points.shift();
    drawTrail();
  });
  window.addEventListener('pointerup', (e)=>{
    if(!dragging || sliced) return;
    dragging = false;
    points.push({x:e.clientX, y:e.clientY});
    const len = pathLength(points);
    const hit = pathHitsOrange(points);
    const isTap = len < 12; // simple click/tap fallback

    if(hit && (len > 30 || isTap)){
      const first = points[0], last = points[points.length-1];
      let angle = Math.atan2(last.y-first.y, last.x-first.x) * 180/Math.PI;
      if(isTap) angle = -20; // pleasant default diagonal for a plain tap
      sliceOrange(angle, {x:(first.x+last.x)/2, y:(first.y+last.y)/2});
    }
    clearTrailSoon();
  });

  function spawnDroplets(x, y){
    for(let i=0;i<14;i++){
      const d = document.createElement('div');
      d.className = 'droplet';
      const a = Math.random()*Math.PI*2;
      const dist = 40 + Math.random()*70;
      d.style.setProperty('--tx', Math.cos(a)*dist + 'px');
      d.style.setProperty('--ty', Math.sin(a)*dist + 'px');
      d.style.left = x + 'px';
      d.style.top = y + 'px';
      document.body.appendChild(d);
      setTimeout(()=>d.remove(), 750);
    }
  }

  function spawnFlash(x, y){
    const f = document.createElement('div');
    f.className = 'flash';
    const size = 220;
    f.style.width = size+'px';
    f.style.height = size+'px';
    f.style.left = x+'px';
    f.style.top = y+'px';
    document.body.appendChild(f);
    setTimeout(()=>f.remove(), 550);
  }

  function sliceOrange(angleDeg, point){
    sliced = true;
    const rig = document.getElementById('orange-rig');
    rig.classList.add('sliced');

    const left = rig.querySelector('.half.left');
    const right = rig.querySelector('.half.right');
    const flyDist = 90;
    const rad = (angleDeg+90) * Math.PI/180; // perpendicular to slice direction
    const fx = Math.cos(rad)*flyDist + 'px';
    const fy = Math.sin(rad)*flyDist + 'px';
    [left,right].forEach(h=>{
      h.style.setProperty('--fx', fx);
      h.style.setProperty('--fy', fy);
      h.style.transform = `rotate(${angleDeg}deg)`;
      h.style.opacity = '1';
      h.classList.add('fly');
    });

    spawnDroplets(point.x, point.y);
    spawnFlash(point.x, point.y);

    document.getElementById('gate-text').style.opacity = '0';

    setTimeout(revealSite, 850);
  }

  function revealSite(){
    document.getElementById('stage').classList.add('leaving');
    const site = document.getElementById('site');
    site.hidden = false;
    requestAnimationFrame(()=> site.classList.add('show'));
  }

  document.getElementById('skip-link').addEventListener('click', ()=>{
    if(sliced) return;
    sliced = true;
    revealSite();
  });

})();
</script>
</body>
</html>
